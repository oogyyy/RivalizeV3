name: Database Migrations

# Applies any new Supabase migrations to the production database after they
# land on main. `supabase db push` only runs migrations whose version is not
# already recorded in the remote history, so this is a no-op when nothing changed.
on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/migrations.yml'
  workflow_dispatch: {}

# Avoid concurrent pushes racing against the same database.
concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  migrate:
    name: supabase db push
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: tfehusarmrbburyzbxxi
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Apply migrations
        run: supabase db push
