version: 2
updates:
  # ── npm (Next.js frontend) ─────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      radix-ui:
        patterns: ["@radix-ui/*"]
      supabase:
        patterns: ["@supabase/*"]
      aws-sdk:
        patterns: ["@aws-sdk/*"]
      ai-sdk:
        patterns: ["ai", "@ai-sdk/*"]

  # ── Go (go-parser service) ─────────────────────────────────────
  - package-ecosystem: gomod
    directory: /go-parser
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3

  # ── GitHub Actions ─────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
