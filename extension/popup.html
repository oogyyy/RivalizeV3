<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rivalize Demo Importer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #111;
      color: #e5e5e5;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid #222;
      background: #0d0d0d;
    }
    .header-logo {
      color: #00ffc8;
      display: flex;
      align-items: center;
      gap: 7px;
      font-weight: 700;
      font-size: 14px;
    }
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green { background: #00ffc8; box-shadow: 0 0 6px rgba(0,255,200,0.5); }
    .dot-gray  { background: #555; }

    .status-text { font-size: 12px; color: #aaa; }
    .status-text strong { color: #e5e5e5; display: block; font-size: 13px; margin-bottom: 1px; }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid #1a1a1a;
      font-size: 11px;
      color: #555;
      text-align: center;
    }
    .footer a { color: #00ffc8; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    .help-text {
      font-size: 11.5px;
      color: #666;
      line-height: 1.5;
    }
    .help-text a { color: #00ffc8; text-decoration: none; }
    .help-text a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Rivalize
    </div>
  </div>

  <div class="body">
    <div class="status-row">
      <div class="dot" id="dot"></div>
      <div class="status-text" id="status-text">
        <strong id="status-title">Checking…</strong>
        <span id="status-sub"></span>
      </div>
    </div>

    <p class="help-text" id="help-text" style="display:none">
      Visit <a href="https://rivalize.gg" target="_blank">rivalize.gg</a> and log in,
      then come back to FACEIT — the extension will connect automatically.
    </p>
  </div>

  <div class="footer">
    Demo Importer for <a href="https://rivalize.gg" target="_blank">rivalize.gg</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
